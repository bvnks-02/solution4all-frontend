  <line x1="60" y1="230" x2="60" y2="236" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="264" x2="60" y2="270" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="250" x2="46" y2="250" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="74" y1="250" x2="80" y2="250" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>
