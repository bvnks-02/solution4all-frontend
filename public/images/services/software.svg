  <circle cx="115" cy="64" r="5" fill="#F5A800" opacity="0.8"/>
  <circle cx="130" cy="64" r="5" fill="#22C55E" opacity="0.8"/>
  <!-- Code lines -->
  <rect x="100" y="95" width="60" height="6" rx="3" fill="#0891B2"/>
