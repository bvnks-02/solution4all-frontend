  <!-- Line numbers -->
  <rect x="88" y="95" width="6" height="4" rx="1" fill="white" opacity="0.15"/>
  <rect x="88" y="110" width="6" height="4" rx="1" fill="white" opacity="0.15"/>
  <rect x="88" y="125" width="6" height="4" rx="1" fill="white" opacity="0.15"/>
  <rect x="88" y="140" width="6" height="4" rx="1" fill="white" opacity="0.15"/>
  <rect x="88" y="155" width="6" height="4" rx="1" fill="white" opacity="0.15"/>
  <rect x="88" y="170" width="6" height="4" rx="1" fill="white" opacity="0.15"/>
  <rect x="88" y="185" width="6" height="4" rx="1" fill="white" opacity="0.15"/>
  <!-- Shield icon -->
  <path d="M320 80 L320 100 Q320 120 340 128 Q360 120 360 100 L360 80 L340 72 Z" fill="#22C55E" opacity="0.2" stroke="#22C55E" stroke-width="2"/>
  <path d="M333 98 L340 105 L355 90" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
