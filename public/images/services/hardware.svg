  <path d="M160 120 Q160 80 200 80 Q240 80 240 120" stroke="#1C3F7A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Laptop in bag -->
  <rect x="155" y="150" width="90" height="55" rx="4" fill="#1C3F7A"/>
  <rect x="161" y="156" width="78" height="40" rx="2" fill="#E8F0FE"/>
  <rect x="145" y="205" width="110" height="6" rx="2" fill="#1C3F7A"/>
