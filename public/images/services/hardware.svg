  <rect x="170" y="165" width="30" height="3" rx="1" fill="#0891B2"/>
  <rect x="170" y="172" width="50" height="3" rx="1" fill="#1C3F7A" opacity="0.3"/>
  <rect x="170" y="179" width="40" height="3" rx="1" fill="#22C55E" opacity="0.6"/>
  <!-- Printer -->
  <rect x="290" y="160" width="70" height="40" rx="6" fill="#1C3F7A"/>
  <rect x="298" y="166" width="54" height="20" rx="2" fill="#E8F0FE"/>
  <rect x="300" y="200" width="50" height="5" rx="1" fill="#F5A800"/>
  <rect x="310" y="150" width="30" height="14" rx="3" fill="#1C3F7A" opacity="0.7"/>
  <!-- UPS/Onduleur -->
  <rect x="40" y="170" width="50" height="70" rx="6" fill="#1C3F7A"/>
  <rect x="48" y="178" width="34" height="30" rx="2" fill="#E8F0FE"/>
  <circle cx="65" cy="225" r="6" fill="#22C55E"/>
  <path d="M61 225 L65 229 L71 221" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lightning bolt on UPS -->
  <path d="M65 182 L60 195 L67 195 L62 208" stroke="#F5A800" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
