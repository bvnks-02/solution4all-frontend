  <circle cx="305" cy="97" r="5" fill="#1C3F7A"/>
  <rect x="315" y="90" width="35" height="4" rx="2" fill="#1C3F7A" opacity="0.6"/>
  <rect x="315" y="98" width="25" height="4" rx="2" fill="#1C3F7A" opacity="0.4"/>
  <!-- Star rating -->
  <path d="M50 130 L55 142 L68 142 L58 150 L62 162 L50 155 L38 162 L42 150 L32 142 L45 142 Z" fill="#F5A800"/>
  <!-- Decorative -->
  <circle cx="340" cy="250" r="4" fill="#0891B2" opacity="0.3"/>
